<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Favicons & Theme Setup -->
    <link rel="icon" type="image/svg+xml" href="/fav.webp" />
    <link rel="apple-touch-icon" href="/fav.webp" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0B0C10" media="(prefers-color-scheme: dark)" />
    
    <!-- Primary Meta Tags -->
    <title>Kyrellos Sameh | Creative Frontend Architect</title>
    <meta name="title" content="Kyrellos Sameh | Creative Frontend Architect" />
    <meta name="description" content="Explore the portfolio of Kyrellos Sameh, an elite Frontend Engineer specializing in high-performance React web applications, dynamic cyber-aesthetics, and flawless UI/UX." />
    <meta name="keywords" content="Kyrellos Sameh, Frontend Developer, React Architect, Web Performance Expert, UI/UX Engineer, Cyber-Aesthetic Design" />
    <meta name="author" content="Kyrellos Sameh" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kyrellos-portfolio.vercel.app/" />
    <meta property="og:title" content="Kyrellos Sameh | Creative Frontend Architect" />
    <meta property="og:description" content="Explore the portfolio of Kyrellos Sameh, an elite Frontend Engineer specializing in high-performance React web applications, dynamic cyber-aesthetics, and flawless UI/UX." />
    <meta property="og:image" content="./og-image.webp" />

    <!-- Twitter / X -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://kyrellos-portfolio.vercel.app/" />
    <meta property="twitter:title" content="Kyrellos Sameh | Creative Frontend Architect" />
    <meta property="twitter:description" content="Explore the portfolio of Kyrellos Sameh, an elite Frontend Engineer specializing in high-performance React web applications, dynamic cyber-aesthetics, and flawless UI/UX." />
    <meta property="twitter:image" content="./og-image.webp" />

    <!-- Theme Initialization (Prevents FOUC) -->
    <script>
      (function() {
        try {
          var localTheme = localStorage.getItem('theme');
          var sysTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = localTheme === 'dark' || (!localTheme && sysTheme);
          var html = document.documentElement;
          
          if (isDark) {
            html.classList.add('dark');
            html.style.backgroundColor = '#0B0C10';
            html.style.color = '#06b6d4';
          } else {
            html.classList.remove('dark');
            html.style.backgroundColor = '#f8fafc';
            html.style.color = '#0f172a';
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-slate-50 dark:bg-[#0B0C10] text-slate-900 dark:text-[#06b6d4] transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
